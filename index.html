<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Maestro de Bodega — Concha y Toro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#0a0a09; --surface:#161512; --surface2:#1e1c18; --border:#2e2c29;
  --accent:#c8a84b; --text:#e8e4de; --muted:#8a837a;
  --ok:#4a8c4a; --warn:#c8872a; --danger:#a03030;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ─── HEADER ─── */
#topbar{
  position:sticky;top:0;z-index:500;
  background:rgba(10, 10, 9, 0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 30px; display:flex; align-items:center; justify-content:space-between; gap:20px;
}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--accent);}

.search-container { position: relative; flex: 1; max-width: 400px; }
#searchInput, #dbSearch {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    padding:10px 15px; border-radius:6px; color:#fff; outline:none;
}

.suggestions-box {
    position: absolute; top: 100%; left: 0; right: 0; background: var(--surface2);
    border: 1px solid var(--accent); border-top:none; border-radius: 0 0 8px 8px; 
    display: none; z-index: 600; max-height: 250px; overflow-y: auto;
}
.suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.suggestion-item:hover { background: var(--accent); color: #000; }

/* ─── BODEGA VISUAL (CORRECCIÓN DE FILAS) ─── */
#whWrap { padding: 25px 30px; }
.row-container { 
    margin-bottom: 30px; background: var(--surface); border-radius: 12px; 
    border: 1px solid var(--border); padding: 20px; position: relative;
}
.row-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:0.75rem; color:var(--muted); }
.row-info b { color: var(--accent); font-family: 'Bebas Neue'; font-size: 1.5rem; }

.wh-row {
  height:100px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; display:flex; align-items:center; 
  position:relative; overflow: visible !important; 
}

.product {
  height:85px; border-radius:4px; display:flex; flex-direction:column; justify-content:center;
  padding:5px; cursor:pointer; position:relative; flex-shrink:0;
  transition: all 0.2s; border:1px solid rgba(255,255,255,0.05); margin-right: 1px;
  overflow: visible !important;
}

/* OCULTAMOS TEXTO QUE SE AMONTONABA */
.product-name, .product-sku { display: none !important; }
.product-pos { font-family: 'DM Mono'; font-size: 0.8rem; color: var(--accent); font-weight: bold; text-align: center; }

/* CARTEL FLOTANTE (TOOLTIP) */
.product:hover::after {
    content: attr(data-info);
    position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
    background: #1e1c18; color: #fff; padding: 12px; border: 1px solid var(--accent);
    border-radius: 8px; font-size: 0.8rem; line-height: 1.4; white-space: pre;
    z-index: 99999 !important; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
    pointer-events: none; text-align: left; min-width: 200px;
}

/* MODALES Y UI */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px); display:none; align-items:center; justify-content:center; z-index:2000; }
.modal.open { display:flex; }
.modal-content { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.editor-grid { display: grid; grid-template-columns: 1fr 320px; }
.db-table-container { flex: 1; overflow-y: auto; border: 1px solid var(--border); margin-top: 15px; }
.db-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.db-table th { position: sticky; top: 0; background: var(--surface2); padding: 15px; text-align: left; border-bottom: 2px solid var(--accent); }
.db-table td { padding: 12px; border-bottom: 1px solid var(--border); }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
.field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; outline: none; }
.btn { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.stock-dot { width: 10px; height: 10px; border-radius: 50%; display: block; margin: 5px auto; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:#0a0a09; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--surface); padding:40px; border-radius:16px; width:350px; border:1px solid var(--accent); text-align:center;">
        <h2 style="font-family:'Bebas Neue'; color:var(--accent); font-size:2rem; margin-bottom:20px;">Acceso Bodega</h2>
        <div class="field" style="text-align:left;"><label>Correo</label><input type="email" id="loginEmail"></div>
        <div class="field" style="text-align:left;"><label>Contraseña</label><input type="password" id="loginPass"></div>
        <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Entrar</button>
        <p id="loginError" style="color:var(--danger); font-size:0.8rem; margin-top:15px; display:none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="topbar">
  <h1>Bodega Concha y Toro</h1>
  <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="handleSearch(this.value, 'searchSuggestions', false)">
      <div id="searchSuggestions" class="suggestions-box"></div>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn btn-secondary" onclick="openInventoryDB()">📊 Base de Datos</button>
    <button class="btn btn-secondary" onclick="openRowModal()">+ Nueva Fila</button>
    <button class="btn btn-primary" onclick="openProductModal()">+ Agregar Producto</button>
    <button class="btn btn-danger" onclick="firebase.auth().signOut()">Salir</button>
  </div>
</div>

<div id="whWrap"></div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="editor-grid">
        <div style="padding: 40px;">
            <h2 id="pTitle" style="font-family:'Bebas Neue'; color:var(--accent); font-size:2rem; margin-bottom:25px;">Editor</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="field"><label>SKU</label><input id="pSku" type="text"></div>
                <div class="field"><label>Nombre</label><input id="pName" type="text"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="field"><label>Ancho</label><input id="pWidth" type="number" step="0.01"></div>
                <div class="field"><label>Color</label><input id="pColor" type="color" value="#c8a84b"></div>
            </div>
            <div class="field"><label>Fila</label><select id="pRowSelect"></select></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; background:var(--surface2); padding:20px; border-radius:8px;">
                <div class="field"><label>Stock</label><input id="pCurrent" type="number"></div>
                <div class="field"><label>Mín.</label><input id="pMin" type="number"></div>
                <div class="field"><label>Máx.</label><input id="pMax" type="number"></div>
            </div>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <button class="btn btn-primary" style="flex:2" onclick="saveProduct()">Guardar</button>
                <button id="btnDelProd" class="btn btn-danger" style="display:none" onclick="deleteProduct()">Eliminar</button>
                <button class="btn btn-secondary" onclick="closeModals()">Cerrar</button>
            </div>
        </div>
        <div style="background:var(--surface2); padding:40px; border-left:1px solid var(--border);">
            <div class="field">
                <label>Vista Previa</label>
                <div id="pImgPreview" style="width:100%; height:240px; background:#000; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px dashed var(--muted);"><span>Sin Imagen</span></div>
                <input type="file" id="pImgInput" accept="image/*" onchange="processImage(this)" style="margin-top:20px; font-size:0.7rem; width:100%;">
            </div>
        </div>
    </div>
  </div>
</div>

<div id="dbModal" class="modal">
    <div class="modal-content" style="width: 95%; height: 88vh; padding: 30px; display: flex; flex-direction: column;">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:20px;">
            <h2 style="font-family:'Bebas Neue'; color:var(--accent); font-size:1.8rem;">Inventario</h2>
            <div class="search-container" style="flex:1">
                <input type="text" id="dbSearch" placeholder="🔍 Buscar en tabla..." oninput="filterDB(this.value)">
            </div>
            <button class="btn btn-secondary" onclick="toggleSapSection()">📋 Importar SAP</button>
            <button class="btn btn-primary" onclick="applyDBChanges()">Guardar Ajustes</button>
            <button class="btn btn-secondary" onclick="closeModals()">Cerrar</button>
        </div>
        
        <div id="sapImportSection" style="display:none; background:var(--surface2); padding:15px; border-radius:8px; margin-top:15px; border:1px solid var(--border);">
            <textarea id="sapPasteInput" style="width:100%; height:90px; background:var(--bg); border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px; resize:none;" placeholder="Pega: SKU | Nombre | Cantidad"></textarea>
            <button class="btn btn-primary" style="margin-top:10px;" onclick="processSapPaste()">Procesar Carga SAP</button>
        </div>

        <div class="db-table-container">
            <table class="db-table">
                <thead><tr><th>Ubicación</th><th>SKU</th><th>Vino</th><th>Stock</th><th>Mín.</th><th>Acción</th></tr></thead>
                <tbody id="dbTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="rowModal" class="modal">
    <div class="modal-content" style="width:400px; padding:30px;">
      <h2 style="font-family:'Bebas Neue'; color:var(--accent); margin-bottom:20px;">Configurar Fila</h2>
      <input type="hidden" id="rId">
      <div class="field"><label>Nombre</label><input id="rName" type="text"></div>
      <div class="field"><label>Metros</label><input id="rSize" type="number" step="0.1"></div>
      <button class="btn btn-primary" style="width:100%" onclick="saveRow()">Guardar</button>
      <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="closeModals()">Cancelar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
// CONFIGURACIÓN ORIGINAL
const firebaseConfig = {
  apiKey: "AIzaSyARv7i6uHqYHiuRfA7jkx8MdzmVKwWqxAo",
  authDomain: "bodega-concha-toro.firebaseapp.com",
  databaseURL: "https://bodega-concha-toro-default-rtdb.firebaseio.com/",
  projectId: "bodega-concha-toro",
  storageBucket: "bodega-concha-toro.firebasestorage.app",
  messagingSenderId: "292866536059",
  appId: "1:292866536059:web:4b69d406debf25d8d468de"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ROWS = [], PRODUCTS = [], DB_CHANGES = {}, tempImg = null;

firebase.auth().onAuthStateChanged(user => {
    if(user) {
        document.getElementById('loginScreen').style.display = 'none';
        db.ref('bodega').on('value', snap => {
            const data = snap.val() || {};
            ROWS = data.rows || [{id:'R1', name:'Fila A', sizeM:15}];
            PRODUCTS = data.products || [];
            render();
        });
    } else { document.getElementById('loginScreen').style.display = 'flex'; }
});

function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    firebase.auth().signInWithEmailAndPassword(email, pass).catch(() => alert("Acceso denegado"));
}

function sync() { db.ref('bodega').set({ rows: ROWS, products: PRODUCTS }); }

function render() {
    const wrap = document.getElementById('whWrap');
    wrap.innerHTML = '';
    ROWS.forEach(row => {
        const rowProds = PRODUCTS.filter(p => p.rowId === row.id);
        const container = document.createElement('div');
        container.className = 'row-container';
        container.innerHTML = `<div class="row-header"><div class="row-info"><b>${row.name}</b></div><button class="btn btn-secondary" style="padding:4px 8px" onclick="openRowModal('${row.id}')">⚙️</button></div><div class="wh-row" id="${row.id}"></div>`;
        const rowEl = container.querySelector('.wh-row');
        rowProds.forEach((p, index) => {
            const posLabel = `${row.name.split(' ').pop()}${index + 1}`;
            const pEl = document.createElement('div');
            pEl.className = 'product';
            pEl.style.width = (p.widthM / row.sizeM * 100) + '%';
            pEl.style.borderTop = `4px solid ${p.color}`;
            pEl.setAttribute('data-info', `UBICACIÓN: ${posLabel}\nPRODUCTO: ${p.name}\nSKU: ${p.sku}\nSTOCK: ${p.current}`);
            pEl.onclick = () => openProductModal(p.sku);
            pEl.innerHTML = `<div class="product-pos">${posLabel}</div><span class="stock-dot" style="background:${p.current < p.min ? 'var(--danger)' : 'var(--ok)'}"></span>`;
            rowEl.appendChild(pEl);
        });
        wrap.appendChild(container);
    });
}

// FUNCIONES RESTAURADAS
function handleSearch(v, boxId) {
    const s = document.getElementById(boxId);
    if(!v) { s.style.display='none'; return; }
    const m = PRODUCTS.filter(p => p.sku.toLowerCase().includes(v.toLowerCase()) || p.name.toLowerCase().includes(v.toLowerCase()));
    s.style.display = m.length ? 'block' : 'none';
    s.innerHTML = m.map(p => `<div class="suggestion-item" onclick="openProductModal('${p.sku}')"><b>${p.sku}</b> - ${p.name}</div>`).join('');
}

function processSapPaste() {
    const input = document.getElementById('sapPasteInput').value.trim();
    if(!input) return;
    const lines = input.split('\n');
    lines.forEach(line => {
        const cols = line.split(/\t|,|;/);
        if(cols.length >= 3) {
            const sku = cols[0].trim(), name = cols[1].trim(), qty = parseInt(cols[2].trim()) || 0;
            const p = PRODUCTS.find(x => x.sku.toLowerCase() === sku.toLowerCase());
            if(p) { p.current = qty; p.name = name; }
            else { PRODUCTS.push({sku, name, widthM: 0.4, color: "#c8a84b", rowId: ROWS[0].id, current: qty, min: 0, max: 0}); }
        }
    });
    sync(); alert("Carga completada");
}

function processImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            tempImg = e.target.result;
            document.getElementById('pImgPreview').innerHTML = `<img src="${tempImg}" style="width:100%">`;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function openInventoryDB() { DB_CHANGES = {}; document.getElementById('dbModal').classList.add('open'); filterDB(''); }
function filterDB(q) {
    const b = document.getElementById('dbTableBody'); b.innerHTML = '';
    PRODUCTS.filter(p => p.sku.toLowerCase().includes(q.toLowerCase()) || p.name.toLowerCase().includes(q.toLowerCase())).forEach(p => {
        b.innerHTML += `<tr><td>S/N</td><td>${p.sku}</td><td>${p.name}</td><td><input type="number" value="${p.current}" oninput="DB_CHANGES['${p.sku}'] = parseInt(this.value)"></td><td>${p.min}</td><td><button class="btn btn-secondary" onclick="openProductModal('${p.sku}')">Ver</button></td></tr>`;
    });
}

function applyDBChanges() {
    Object.keys(DB_CHANGES).forEach(sku => { const p = PRODUCTS.find(x => x.sku === sku); if(p) p.current = DB_CHANGES[sku]; });
    sync(); closeModals();
}

function openProductModal(sku = null) {
    document.getElementById('pRowSelect').innerHTML = ROWS.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    if(sku) {
        const p = PRODUCTS.find(x => x.sku === sku);
        document.getElementById('pSku').value = p.sku; document.getElementById('pSku').disabled = true;
        document.getElementById('pName').value = p.name; document.getElementById('pWidth').value = p.widthM;
        document.getElementById('pColor').value = p.color; document.getElementById('pRowSelect').value = p.rowId;
        document.getElementById('pCurrent').value = p.current; document.getElementById('pMin').value = p.min;
        document.getElementById('pMax').value = p.max;
        document.getElementById('pImgPreview').innerHTML = p.photo ? `<img src="${p.photo}" style="width:100%">` : '<span>Sin Imagen</span>';
        document.getElementById('btnDelProd').style.display = 'block';
    } else {
        document.getElementById('pSku').value = ''; document.getElementById('pSku').disabled = false;
        document.getElementById('btnDelProd').style.display = 'none';
    }
    document.getElementById('productModal').classList.add('open');
}

function saveProduct() {
    const sku = document.getElementById('pSku').value;
    const data = {
        sku, name: document.getElementById('pName').value, widthM: parseFloat(document.getElementById('pWidth').value) || 0.4,
        color: document.getElementById('pColor').value, rowId: document.getElementById('pRowSelect').value,
        current: parseInt(document.getElementById('pCurrent').value) || 0, min: parseInt(document.getElementById('pMin').value) || 0,
        max: parseInt(document.getElementById('pMax').value) || 0, photo: tempImg
    };
    const idx = PRODUCTS.findIndex(p => p.sku === sku);
    if(idx >= 0) PRODUCTS[idx] = data; else PRODUCTS.push(data);
    sync(); closeModals();
}

function openRowModal(id = null) {
    const r = id ? ROWS.find(x => x.id === id) : {id:'', name:'', sizeM:15};
    document.getElementById('rId').value = r.id; document.getElementById('rName').value = r.name; document.getElementById('rSize').value = r.sizeM;
    document.getElementById('rowModal').classList.add('open');
}

function saveRow() {
    const id = document.getElementById('rId').value;
    const data = { id: id || 'R'+Date.now(), name: document.getElementById('rName').value, sizeM: parseFloat(document.getElementById('rSize').value) || 15 };
    if(id) ROWS[ROWS.findIndex(x=>x.id===id)] = data; else ROWS.push(data);
    sync(); closeModals();
}

function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
function toggleSapSection() { const s = document.getElementById('sapImportSection'); s.style.display = s.style.display === 'none' ? 'block' : 'none'; }
</script>
</body>
</html>
