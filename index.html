<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Maestro de Bodega — Concha y Toro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#0a0a09; --surface:#161512; --surface2:#1e1c18; --border:#2e2c29;
  --accent:#c8a84b; --text:#e8e4de; --muted:#8a837a;
  --ok:#4a8c4a; --warn:#c8872a; --danger:#a03030;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ─── HEADER Y ALERTAS ─── */
#topbar{
  position:sticky;top:0;z-index:500;
  background:rgba(10, 10, 9, 0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 30px; display:flex; align-items:center; justify-content:space-between; gap:20px;
}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--accent);}

.search-container { position: relative; flex: 1; max-width: 400px; }
#searchInput, #dbSearch {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    padding:10px 15px; border-radius:6px; color:#fff; outline:none; transition: 0.3s;
}

.suggestions-box {
    position: absolute; top: 100%; left: 0; right: 0; background: var(--surface2);
    border: 1px solid var(--accent); border-top:none; border-radius: 0 0 8px 8px; 
    display: none; z-index: 600; max-height: 250px; overflow-y: auto;
}
.suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.suggestion-item:hover { background: var(--accent); color: #000; }

#alertBar {
    background: rgba(160, 48, 48, 0.15); border-bottom: 1px solid var(--danger);
    padding: 8px 30px; display: none; align-items: center; gap: 15px; font-size: 0.75rem;
}

/* ─── BODEGA VISUAL ─── */
#whWrap { padding: 25px 30px; }
.row-container { 
    margin-bottom: 30px; background: var(--surface); border-radius: 12px; 
    border: 1px solid var(--border); padding: 20px; transition: 0.3s;
}
.row-header { 
    display:flex; justify-content:space-between; align-items:center; 
    margin-bottom:12px; font-size:0.75rem; color:var(--muted);
}
.row-info b { color: var(--accent); font-family: 'Bebas Neue'; font-size: 1.5rem; }

.wh-row {
  height:100px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; display:flex; align-items:center; position:relative; overflow:hidden;
}

.product {
  height:85px; border-radius:4px; display:flex; flex-direction:column; justify-content:center;
  padding:10px; cursor:grab; position:relative; flex-shrink:0;
  transition: transform 0.2s, box-shadow 0.3s; border:1px solid rgba(255,255,255,0.05);
  margin-right: 1px;
}
.product-name { font-size:0.75rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.product-pos { font-family: 'DM Mono'; font-size: 0.6rem; color: var(--accent); font-weight: bold; margin-bottom: 2px; }
.product-sku { font-family: 'DM Mono'; font-size: 0.6rem; opacity: 0.6; }
/* ─── NUEVO TOOLTIP ─── */

.product-tooltip{
    position:absolute;
    bottom:105%;
    left:50%;
    transform:translateX(-50%);
    background:rgba(15,15,15,0.98);
    border:1px solid var(--accent);
    color:#fff;
    padding:10px 12px;
    border-radius:8px;
    min-width:180px;
    pointer-events:none;
    opacity:0;
    transition:0.2s;
    z-index:9999;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.product:hover .product-tooltip{
    opacity:1;
}

.product-tooltip .tt-title{
    font-weight:700;
    color:var(--accent);
    font-size:0.8rem;
    margin-bottom:4px;
}

.product-tooltip .tt-sku{
    font-family:'DM Mono';
    font-size:0.7rem;
    opacity:0.7;
}

.product.compact .product-name,
.product.compact .product-sku{
    display:none;
}

.product.compact{
    justify-content:flex-start;
    padding-top:8px;
    align-items:center;
}
.is-highlighted {
    box-shadow: 0 0 25px var(--accent);
    border: 2px solid var(--accent) !important;
    transform: scale(1.05);
    z-index: 100;
}

/* ─── MODALES (CAPAS DE PROFUNDIDAD) ─── */
.modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px);
  display:none; align-items:center; justify-content:center; z-index:1000;
}
#dbModal { z-index: 1000; } 
#productModal { z-index: 2000; } 
#rowModal { z-index: 1500; }

.modal.open { display:flex; }
.modal-content { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }

#productModal .modal-content { width: 850px; }
.editor-grid { display: grid; grid-template-columns: 1fr 320px; }
.editor-body { padding: 40px; }
.editor-sidebar { background: var(--surface2); padding: 40px; border-left: 1px solid var(--border); }

/* BASE DE DATOS */
#dbModal .modal-content { width: 95%; height: 88vh; padding: 30px; display: flex; flex-direction: column; }
.db-table-container { flex: 1; overflow-y: auto; border: 1px solid var(--border); margin-top: 15px; }
.db-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.db-table th { position: sticky; top: 0; background: var(--surface2); padding: 15px; text-align: left; border-bottom: 2px solid var(--accent); z-index: 10; }
.db-table td { padding: 12px; border-bottom: 1px solid var(--border); }
.db-table input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 5px; border-radius: 4px; width: 80px; }

/* UI ELEMENTS */
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
.field input, .field select { 
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; 
    padding: 12px; border-radius: 6px; outline: none;
}
.btn { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }

.img-preview { width: 100%; height: 240px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed var(--muted); }
.img-preview img { width: 100%; height: 100%; object-fit: contain; }
.stock-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:#0a0a09; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--surface); padding:40px; border-radius:16px; width:350px; border:1px solid var(--accent); text-align:center;">
        <h2 style="font-family:'Bebas Neue'; color:var(--accent); font-size:2rem; margin-bottom:20px;">Acceso Bodega</h2>
        <div class="field" style="text-align:left;"><label>Correo</label><input type="email" id="loginEmail"></div>
        <div class="field" style="text-align:left;"><label>Contraseña</label><input type="password" id="loginPass"></div>
        <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Entrar</button>
        <p id="loginError" style="color:var(--danger); font-size:0.8rem; margin-top:15px; display:none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="alertBar">
    <strong style="color:var(--danger)">⚠️ ALERTAS:</strong> <span id="alertText"></span>
</div>

<div id="topbar">
  <h1>Bodega Concha y Toro</h1>
  <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="handleSearch(this.value, 'searchSuggestions', false)" onkeydown="if(event.key === 'Enter'){ currentH = null; this.value = ''; render(); }">
      <div id="searchSuggestions" class="suggestions-box"></div>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn btn-secondary" onclick="openInventoryDB()">📊 Base de Datos</button>
    <button class="btn btn-secondary" onclick="openRowModal()">+ Nueva Fila</button>
    <button class="btn btn-primary" onclick="openProductModal()">+ Agregar Producto</button>
    <button class="btn btn-danger" onclick="firebase.auth().signOut()">Cerrar Sesión</button>
  </div>
</div>

<div id="whWrap"></div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="editor-grid">
        <div class="editor-body">
            <h2 id="pTitle" style="font-family:'Bebas Neue'; color:var(--accent); font-size:2rem; margin-bottom:25px;">Editor de Producto</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="field"><label>SKU</label><input id="pSku" type="text"></div>
                <div class="field"><label>Nombre</label><input id="pName" type="text"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="field"><label>Ancho (Metros)</label><input id="pWidth" type="number" step="0.01"></div>
                <div class="field"><label>Color</label><input id="pColor" type="color" value="#c8a84b"></div>
            </div>
            <div class="field"><label>Fila</label><select id="pRowSelect"></select></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; background:var(--surface2); padding:20px; border-radius:8px;">
                <div class="field" style="margin:0;"><label>Stock</label><input id="pCurrent" type="number"></div>
                <div class="field" style="margin:0;"><label>Mín.</label><input id="pMin" type="number"></div>
                <div class="field" style="margin:0;"><label>Máx.</label><input id="pMax" type="number"></div>
            </div>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <button class="btn btn-primary" style="flex:2" onclick="saveProduct()">Guardar</button>
                <button id="btnDelProd" class="btn btn-danger" style="display:none" onclick="deleteProduct()">Eliminar</button>
                <button class="btn btn-secondary" onclick="closeProductModalOnly()">Cerrar</button>
            </div>
        </div>
        <div class="editor-sidebar">
            <div class="field">
                <label>Vista Previa</label>
                <div class="img-preview" id="pImgPreview"><span>Sin Imagen</span></div>
                <input type="file" id="pImgInput" accept="image/*" onchange="processImage(this)" style="margin-top:20px; font-size:0.7rem; width:100%;">
            </div>
        </div>
    </div>
  </div>
</div>

<div id="rowModal" class="modal">
    <div class="modal-content" style="width:400px; padding:30px;">
      <h2 style="font-family:'Bebas Neue'; color:var(--accent); margin-bottom:20px;">Configurar Fila</h2>
      <input type="hidden" id="rId">
      <div class="field"><label>Nombre</label><input id="rName" type="text"></div>
      <div class="field"><label>Metros Totales</label><input id="rSize" type="number" step="0.1"></div>
      <div style="display:flex; gap:10px; flex-direction:column;">
        <button class="btn btn-primary" onclick="saveRow()">Guardar</button>
        <button id="btnDelRow" class="btn btn-danger" style="display:none" onclick="deleteRow()">Eliminar</button>
        <button class="btn btn-secondary" onclick="closeModals()">Cancelar</button>
      </div>
    </div>
</div>

<div id="dbModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:20px;">
            <h2 style="font-family:'Bebas Neue'; color:var(--accent); font-size:1.8rem;">Ajuste de Inventario</h2>
            <div class="search-container" style="flex:1">
                <input type="text" id="dbSearch" placeholder="🔍 Buscar en tabla..." oninput="handleSearch(this.value, 'dbSuggestions', true)">
                <div id="dbSuggestions" class="suggestions-box"></div>
            </div>
            <button class="btn btn-secondary" onclick="toggleSapSection()">📋 Importar desde SAP</button>
            <button class="btn btn-primary" onclick="applyDBChanges()">Guardar Ajustes</button>
            <button class="btn btn-secondary" onclick="closeModals()">Cerrar</button>
        </div>

        <div id="sapImportSection" style="display:none; background:var(--surface2); padding:15px; border-radius:8px; margin-top:15px; border:1px solid var(--border);">
            <label style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:8px; font-weight:700;">PEGA AQUÍ LAS COLUMNAS DE TU HOJA DE CÁLCULO / SAP (Formatos válidos: SKU | Nombre | Cantidad)</label>
            <textarea id="sapPasteInput" style="width:100%; height:90px; background:var(--bg); border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px; resize:none; font-family:monospace; font-size:0.8rem;" placeholder="Ejemplo:&#10;SKU100    Vino Casillero Cabernet    150&#10;SKU200    Vino Trio Merlot           85"></textarea>
            <button class="btn btn-primary" style="margin-top:10px; padding:8px 16px; font-size:0.8rem;" onclick="processSapPaste()">Procesar Carga e Integrar Masivamente</button>
        </div>

        <div class="db-table-container">
            <table class="db-table">
                <thead><tr><th>Ubicación</th><th>SKU</th><th>Vino</th><th>Stock</th><th>Mín.</th><th>Acción</th></tr></thead>
                <tbody id="dbTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyARv7i6uHqYHiuRfA7jkx8MdzmVKwWqxAo",
  authDomain: "bodega-concha-toro.firebaseapp.com",
  databaseURL: "https://bodega-concha-toro-default-rtdb.firebaseio.com/",
  projectId: "bodega-concha-toro",
  storageBucket: "bodega-concha-toro.firebasestorage.app",
  messagingSenderId: "292866536059",
  appId: "1:292866536059:web:4b69d406debf25d8d468de"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    firebase.auth().signInWithEmailAndPassword(email, pass).catch(err => {
        document.getElementById('loginError').style.display = 'block';
    });
}

firebase.auth().onAuthStateChanged(user => {
    if(user) {
        document.getElementById('loginScreen').style.display = 'none';
        db.ref('bodega').on('value', snap => {
            const data = snap.val();
            if(data) {
                ROWS = data.rows || [{id:'R1', name:'Fila A', sizeM:15}];
                PRODUCTS = data.products || [];
            } else {
                ROWS = [{id:'R1', name:'Fila A', sizeM:15}];
                PRODUCTS = [];
            }
            render();
        });
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
    }
});

let ROWS = [];
let PRODUCTS = [];
let tempImg = null, currentH = null;
let DB_CHANGES = {};

function sync() {
    if(firebase.auth().currentUser) {
        const safeRows = JSON.parse(JSON.stringify(ROWS));
        const safeProducts = JSON.parse(JSON.stringify(PRODUCTS));
        db.ref('bodega').set({ rows: safeRows, products: safeProducts });
    }
    render();
}

function render() {
    const wrap = document.getElementById('whWrap');
    wrap.innerHTML = '';
    let alerts = [];

    ROWS.forEach(row => {
        const rowProds = PRODUCTS.filter(p => p.rowId === row.id);
        const used = rowProds.reduce((s, p) => s + p.widthM, 0);
        const perc = ((used / row.sizeM) * 100).toFixed(1);

        const container = document.createElement('div');
        container.className = 'row-container';
        container.innerHTML = `
            <div class="row-header">
                <div class="row-info"><b>${row.name}</b> <span>${used.toFixed(2)}m / ${row.sizeM}m (${perc}%)</span></div>
                <button class="btn btn-secondary" style="padding:4px 8px; font-size:0.6rem" onclick="openRowModal('${row.id}')">⚙️ Editar</button>
            </div>
            <div class="wh-row" id="${row.id}" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
        `;
        const rowEl = container.querySelector('.wh-row');
        
        rowProds.forEach((p, index) => {
            if(p.current < p.min) alerts.push(p.name);
            const posLabel = `${row.name.split(' ').pop()}${index + 1}`;
            const pEl = document.createElement('div');
            pEl.className = `product ${currentH === p.sku ? 'is-highlighted' : ''}`;
            pEl.id = `p-${p.sku}`;
            pEl.draggable = true;
            pEl.style.background = p.color + '22';
            pEl.style.borderTop = `4px solid ${p.color}`;
            pEl.ondragstart = (e) => e.dataTransfer.setData("sku", p.sku);
            pEl.onclick = () => openProductModal(p.sku);
    const productWidth = (p.widthM / row.sizeM * 100);

pEl.style.width = productWidth + '%';

if(productWidth < 8){
    pEl.classList.add('compact');
}

pEl.innerHTML = `
    <div class="product-pos">${posLabel}</div>

    <div class="product-name">
        <span class="stock-dot" style="background:${p.current < p.min ? 'var(--danger)' : 'var(--ok)'}"></span>
        ${p.name}
    </div>

    <div class="product-sku">${p.sku}</div>

    <div class="product-tooltip">
        <div class="tt-title">${p.name}</div>
        <div class="tt-sku">${p.sku}</div>

        <div style="margin-top:6px; font-size:0.7rem;">
            Stock: ${p.current}
        </div>
    </div>
`;       
        });
        wrap.appendChild(container);
    });

    const ab = document.getElementById('alertBar');
    if(alerts.length) { ab.style.display='flex'; document.getElementById('alertText').innerText = alerts.join(', '); }
    else ab.style.display='none';
}

function drop(e) {
    e.preventDefault();
    const sku = e.dataTransfer.getData("sku");
    const targetRowId = e.currentTarget.id;
    const p = PRODUCTS.find(x => x.sku === sku);
    const rowProds = PRODUCTS.filter(x => x.rowId === targetRowId && x.sku !== sku);
    const used = rowProds.reduce((s, x) => s + x.widthM, 0);
    const targetRow = ROWS.find(r => r.id === targetRowId);

    if (used + p.widthM > targetRow.sizeM) return alert("Sin espacio.");
    const rowEl = document.getElementById(targetRowId);
    const children = Array.from(rowEl.children);
    let insertIdx = children.length;
    children.forEach((child, idx) => {
        const rect = child.getBoundingClientRect();
        if (e.clientX < (rect.left + rect.width / 2) && insertIdx === children.length) insertIdx = idx;
    });
    rowProds.splice(insertIdx, 0, p);
    p.rowId = targetRowId;
    PRODUCTS = [...PRODUCTS.filter(x => x.rowId !== targetRowId), ...rowProds];
    sync();
}

function handleSearch(v, boxId, isDB) {
    const s = document.getElementById(boxId);
    if(!v) { s.style.display='none'; if(isDB) filterDB(''); return; }
    const m = PRODUCTS.filter(p => p.sku.toLowerCase().includes(v.toLowerCase()) || p.name.toLowerCase().includes(v.toLowerCase()));
    s.style.display = m.length ? 'block' : 'none';
    s.innerHTML = m.map(p => `<div class="suggestion-item" onclick="selectSuggestion('${p.sku}', '${boxId}', ${isDB})"><b>${p.sku}</b> - ${p.name}</div>`).join('');
    if(isDB) filterDB(v);
}

function selectSuggestion(sku, boxId, isDB) {
    document.getElementById(boxId).style.display = 'none';
    if(isDB) filterDB(sku);
    else { currentH = sku; render(); document.getElementById(`p-${sku}`)?.scrollIntoView({behavior:'smooth', block:'center'}); }
}

function openProductModal(sku = null) {
    const sel = document.getElementById('pRowSelect');
    sel.innerHTML = ROWS.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    tempImg = null;
    if(sku) {
        const p = PRODUCTS.find(x => x.sku === sku);
        if(!p) return;
        document.getElementById('pSku').value = p.sku; document.getElementById('pSku').disabled = true;
        document.getElementById('pName').value = p.name; document.getElementById('pWidth').value = p.widthM;
        document.getElementById('pColor').value = p.color; document.getElementById('pRowSelect').value = p.rowId;
        document.getElementById('pCurrent').value = p.current; document.getElementById('pMin').value = p.min;
        document.getElementById('pMax').value = p.max; tempImg = p.photo || null;
        document.getElementById('pImgPreview').innerHTML = p.photo ? `<img src="${p.photo}">` : '<span>Sin Imagen</span>';
        document.getElementById('btnDelProd').style.display = 'block';
    } else {
        document.getElementById('pSku').value = ''; document.getElementById('pSku').disabled = false;
        document.getElementById('pName').value = ''; document.getElementById('pImgPreview').innerHTML = '<span>Sin Imagen</span>';
        document.getElementById('btnDelProd').style.display = 'none';
    }
    document.getElementById('productModal').classList.add('open');
}

function saveProduct() {
    const sku = document.getElementById('pSku').value;
    const data = {
        sku, 
        name: document.getElementById('pName').value, 
        widthM: parseFloat(document.getElementById('pWidth').value) || 0,
        color: document.getElementById('pColor').value, 
        rowId: document.getElementById('pRowSelect').value,
        current: parseInt(document.getElementById('pCurrent').value) || 0, 
        min: parseInt(document.getElementById('pMin').value) || 0,
        max: parseInt(document.getElementById('pMax').value) || 0, 
        photo: tempImg || null
    };
    const idx = PRODUCTS.findIndex(p => p.sku === sku);
    if(idx >= 0) PRODUCTS[idx] = data; else PRODUCTS.push(data);
    sync(); closeProductModalOnly();
}

function openInventoryDB() { 
    DB_CHANGES = {}; 
    document.getElementById('sapImportSection').style.display = 'none'; 
    document.getElementById('sapPasteInput').value = '';
    document.getElementById('dbModal').classList.add('open'); 
    filterDB(''); 
}

function filterDB(q) {
    const b = document.getElementById('dbTableBody');
    b.innerHTML = '';
    PRODUCTS.filter(p => p.sku.toLowerCase().includes(q.toLowerCase()) || p.name.toLowerCase().includes(q.toLowerCase())).forEach((p) => {
        const row = ROWS.find(r => r.id === p.rowId);
        const pIdx = PRODUCTS.filter(x => x.rowId === p.rowId).findIndex(x => x.sku === p.sku) + 1;
        const pos = row ? `${row.name.split(' ').pop()}${pIdx}` : 'S/N';
        const displayStock = DB_CHANGES[p.sku] !== undefined ? DB_CHANGES[p.sku] : p.current;
        
        const isLowStock = p.current < p.min;
        const rowStyle = isLowStock ? 'style="background: rgba(160, 48, 48, 0.15); border-left: 3px solid var(--danger);"' : '';

        b.innerHTML += `<tr ${rowStyle}>
            <td><b style="color:var(--accent)">${pos}</b></td>
            <td>${p.sku}</td><td>${p.name}</td>
            <td><input type="number" value="${displayStock}" oninput="DB_CHANGES['${p.sku}'] = parseInt(this.value) || 0"></td>
            <td>${p.min}</td>
            <td><button class="btn btn-secondary" style="padding:4px 8px" onclick="openProductModal('${p.sku}')">Ver</button></td>
        </tr>`;
    });
}

function applyDBChanges() {
    Object.keys(DB_CHANGES).forEach(sku => { 
        const p = PRODUCTS.find(x => x.sku === sku); 
        if(p) p.current = parseInt(DB_CHANGES[sku]) || 0; 
    });
    sync(); closeModals();
}

/* FUNCIONES DE IMPORTACIÓN DESDE SAP */
function toggleSapSection() {
    const section = document.getElementById('sapImportSection');
    section.style.display = section.style.display === 'none' ? 'block' : 'none';
}

function processSapPaste() {
    const inputData = document.getElementById('sapPasteInput').value.trim();
    if (!inputData) return alert("Por favor, pega primero los datos copiados de SAP/Excel.");

    const lines = inputData.split('\n');
    let updatedCount = 0;
    let createdCount = 0;

    lines.forEach(line => {
        const columns = line.split(/\t|,|;/);
        if (columns.length >= 3) {
            const sku = columns[0].trim();
            const name = columns[1].trim();
            const quantity = parseInt(columns[2].trim()) || 0;

            if (!sku) return;

            const existingIdx = PRODUCTS.findIndex(p => p.sku.toLowerCase() === sku.toLowerCase());

            if (existingIdx >= 0) {
                PRODUCTS[existingIdx].current = quantity;
                if (name) PRODUCTS[existingIdx].name = name;
                updatedCount++;
            } else {
                const defaultRow = ROWS[0] ? ROWS[0].id : '';
                const newProduct = {
                    sku: sku,
                    name: name || "Producto Importado SAP",
                    widthM: 0.4,
                    color: "#c8a84b",
                    rowId: defaultRow,
                    current: quantity,
                    min: 0,
                    max: 0,
                    photo: null
                };
                PRODUCTS.push(newProduct);
                createdCount++;
            }
        }
    });

    alert(`¡Proceso completado!\n\n• Stock actualizado en: ${updatedCount} productos.\n• Nuevos agregados: ${createdCount}.`);
    document.getElementById('sapPasteInput').value = '';
    document.getElementById('sapImportSection').style.display = 'none';
    sync();
    filterDB('');
}

function deleteProduct() { 
    if(confirm("¿Eliminar?")) { 
        PRODUCTS = PRODUCTS.filter(p => p.sku !== document.getElementById('pSku').value); 
        sync(); closeProductModalOnly(); 
    } 
}

function openRowModal(id = null) {
    const r = id ? ROWS.find(x => x.id === id) : {id:'', name:'', sizeM:15};
    document.getElementById('rId').value = r.id; document.getElementById('rName').value = r.name; document.getElementById('rSize').value = r.sizeM;
    document.getElementById('btnDelRow').style.display = id ? 'block' : 'none';
    document.getElementById('rowModal').classList.add('open');
}

function saveRow() {
    const id = document.getElementById('rId').value;
    const data = { 
        id: id || 'R'+Date.now(), 
        name: document.getElementById('rName').value, 
        sizeM: parseFloat(document.getElementById('rSize').value) || 15 
    };
    if(id) ROWS[ROWS.findIndex(x=>x.id===id)] = data; else ROWS.push(data);
    sync(); closeModals();
}

function deleteRow() { 
    const id = document.getElementById('rId').value; 
    if(PRODUCTS.some(p => p.rowId === id)) return alert("Fila con productos."); 
    if(confirm("¿Eliminar?")) { 
        ROWS = ROWS.filter(r => r.id !== id); 
        sync(); closeModals(); 
    } 
}

function processImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 300 / img.width; canvas.width = 300; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0,0,300, canvas.height);
                tempImg = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('pImgPreview').innerHTML = `<img src="${tempImg}">`;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
function closeProductModalOnly() { document.getElementById('productModal').classList.remove('open'); }
</script>
