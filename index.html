<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Bodega — Concha y Toro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');

:root {
  --bg:#0a0a09; --surface:#161512; --surface2:#1e1c18; --border:#2e2c29;
  --accent:#c8a84b; --text:#e8e4de; --muted:#8a837a;
  --ok:#4a8c4a; --warn:#c8872a; --danger:#a03030;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ─── HEADER ─── */
#topbar{
  position:sticky;top:0;z-index:500; background:rgba(10,10,9,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:12px 30px; display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.search-container { position:relative; flex:1; max-width:400px; }
#searchInput { width:100%; background:var(--surface2); border:1px solid var(--border); padding:10px 15px; border-radius:6px; color:#fff; }

/* ─── GRILLA DE BODEGA ─── */
#whWrap { padding:25px 30px; }
.row-container { margin-bottom:30px; background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:20px; }
.row-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.row-info b { color:var(--accent); font-family:'Bebas Neue'; font-size:1.5rem; }

.wh-row {
  height:120px; background:rgba(0,0,0,0.3); border:1px dashed var(--border);
  border-radius:8px; display:flex; align-items:center; gap:5px; padding:0 10px; overflow-x:auto;
}

.product {
  height:90px; border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:grab; border:1px solid rgba(255,255,255,0.1); position:relative; transition:0.2s; flex-shrink:0;
}
.product:active { cursor:grabbing; }
.is-highlighted { box-shadow:0 0 15px var(--accent); border:2px solid var(--accent) !important; z-index:10; }

/* ─── UI ELEMENTS ─── */
.btn { padding:10px 18px; border-radius:6px; border:none; cursor:pointer; font-weight:700; display:inline-flex; align-items:center; gap:8px; font-size:0.85rem; }
.btn-primary { background:var(--accent); color:#000; }
.btn-secondary { background:var(--border); color:var(--text); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-icon { padding:5px; background:none; color:var(--muted); font-size:1.1rem; }
.btn-icon:hover { color:var(--accent); }

/* ─── MODALES ─── */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal.open { display:flex; }
.modal-content { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:30px; width:500px; max-width:95%; }

.field { margin-bottom:15px; }
.field label { display:block; font-size:0.75rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; }
.field input, .field select { width:100%; background:var(--bg); border:1px solid var(--border); color:#fff; padding:10px; border-radius:6px; }

#dbModal .modal-content { width:90%; max-height:90vh; overflow-y:auto; }
.db-table { width:100%; border-collapse:collapse; margin-top:15px; }
.db-table th, .db-table td { padding:12px; border-bottom:1px solid var(--border); text-align:left; }
</style>
</head>
<body>

<div id="topbar">
  <img src="logo.png" alt="Logo" style="height:40px;">
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Buscar producto o SKU..." oninput="handleGlobalSearch(this.value)">
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn btn-secondary" onclick="openRowModal()">+ Fila</button>
    <button class="btn btn-secondary" onclick="openDB()">📊 Base de Datos</button>
    <button class="btn btn-primary" onclick="openProductModal()">+ Agregar Producto</button>
  </div>
</div>

<div id="whWrap"></div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle" style="color:var(--accent); font-family:'Bebas Neue'; margin-bottom:20px;">Producto</h2>
    <div class="field"><label>SKU</label><input type="text" id="pSku"></div>
    <div class="field"><label>Nombre del Vino</label><input type="text" id="pName"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
      <div class="field"><label>Ancho (m)</label><input type="number" id="pWidth" step="0.01" value="0.40"></div>
      <div class="field"><label>Fila Actual</label><select id="pRowId"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
        <div class="field"><label>Stock</label><input type="number" id="pCurrent"></div>
        <div class="field"><label>Min</label><input type="number" id="pMin"></div>
        <div class="field"><label>Max</label><input type="number" id="pMax"></div>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="saveProduct()">Guardar Cambios</button>
      <button class="btn btn-secondary" onclick="closeModals()">Cancelar</button>
    </div>
  </div>
</div>

<div id="rowModal" class="modal">
  <div class="modal-content">
    <h2 style="color:var(--accent); font-family:'Bebas Neue'; margin-bottom:20px;">Configurar Fila</h2>
    <input type="hidden" id="editRowId">
    <div class="field"><label>Nombre de Fila (Ej: A)</label><input type="text" id="rName"></div>
    <div class="field"><label>Capacidad Total (metros)</label><input type="number" id="rSize" step="0.5"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="saveRow()">Guardar Fila</button>
      <button class="btn btn-danger" id="btnDelRow" onclick="deleteRow()">Eliminar</button>
      <button class="btn btn-secondary" onclick="closeModals()">Cerrar</button>
    </div>
  </div>
</div>

<div id="dbModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-family:'Bebas Neue'; color:var(--accent);">Inventario Maestro</h2>
            <button class="btn btn-secondary" onclick="closeModals()">Cerrar</button>
        </div>
        <div style="background:var(--surface2); padding:15px; border-radius:8px; margin-top:15px;">
            <label style="font-size:0.7rem; color:var(--muted);">PEGAR DATOS SAP (SKU | NOMBRE | STOCK)</label>
            <textarea id="sapInput" style="width:100%; height:60px; background:#000; color:#0f0; margin-top:5px; padding:10px;"></textarea>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="processSap()">Procesar SAP</button>
        </div>
        <table class="db-table">
            <thead><tr><th>Fila</th><th>SKU</th><th>Producto</th><th>Stock</th><th>Acciones</th></tr></thead>
            <tbody id="dbTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyARv7i6uHqYHiuRfA7jkx8MdzmVKwWqxAo",
  authDomain: "bodega-concha-toro.firebaseapp.com",
  databaseURL: "https://bodega-concha-toro-default-rtdb.firebaseio.com/",
  projectId: "bodega-concha-toro"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ROWS = [], PRODUCTS = [], currentHighlight = null;

// CARGA INICIAL
db.ref('bodega').on('value', snap => {
    const data = snap.val() || {};
    ROWS = data.rows || [];
    PRODUCTS = data.products || [];
    render();
});

function sync() {
    db.ref('bodega').set({ rows: ROWS, products: PRODUCTS });
}

function render() {
    const wrap = document.getElementById('whWrap');
    wrap.innerHTML = '';

    ROWS.forEach(row => {
        const rowProds = PRODUCTS.filter(p => p.rowId === row.id);
        const used = rowProds.reduce((acc, p) => acc + (parseFloat(p.widthM) || 0), 0);
        
        const container = document.createElement('div');
        container.className = 'row-container';
        container.innerHTML = `
            <div class="row-header">
                <div class="row-info">
                    <b>${row.name}</b> 
                    <span style="margin-left:10px; font-size:0.8rem; color:var(--muted)">
                        ${used.toFixed(2)}m / ${row.sizeM}m (${((used/row.sizeM)*100).toFixed(1)}%)
                    </span>
                </div>
                <button class="btn-icon" onclick="openRowModal('${row.id}')">⚙️</button>
            </div>
            <div class="wh-row" id="${row.id}" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
        `;
        
        const rowEl = container.querySelector('.wh-row');
        rowProds.forEach(p => {
            const pEl = document.createElement('div');
            pEl.className = `product ${currentHighlight === p.sku ? 'is-highlighted' : ''}`;
            pEl.draggable = true;
            pEl.style.width = (p.widthM / row.sizeM * 100) + '%';
            pEl.style.background = `linear-gradient(to bottom, #222, #111)`;
            pEl.style.borderTop = `3px solid ${p.current < p.min ? 'var(--danger)' : 'var(--accent)'}`;
            
            pEl.innerHTML = `
                <span style="font-size:0.7rem; color:var(--accent); font-weight:bold;">${p.sku}</span>
                <div style="width:8px; height:8px; border-radius:50%; background:${p.current < p.min ? 'var(--danger)' : 'var(--ok)'}; margin:5px 0;"></div>
                <span style="font-size:0.6rem; text-align:center; padding:0 4px; overflow:hidden;">${p.name}</span>
            `;

            // FIX ARRASTRE VISUAL
            pEl.ondragstart = (e) => {
                e.dataTransfer.setData("sku", p.sku);
                e.target.style.opacity = "0.4";
                // Creamos una imagen fantasma solo del elemento
                const ghost = e.target.cloneNode(true);
                ghost.style.width = "100px";
                document.body.appendChild(ghost);
                e.dataTransfer.setDragImage(ghost, 50, 45);
                setTimeout(() => ghost.remove(), 0);
            };
            pEl.ondragend = (e) => e.target.style.opacity = "1";
            pEl.onclick = () => openProductModal(p.sku);
            
            rowEl.appendChild(pEl);
        });
        wrap.appendChild(container);
    });
}

function drop(e) {
    e.preventDefault();
    const sku = e.dataTransfer.getData("sku");
    const targetRowId = e.currentTarget.id;
    const p = PRODUCTS.find(x => x.sku == sku);
    if(p) {
        p.rowId = targetRowId;
        sync();
    }
}

// PRODUCTOS CRUD
function openProductModal(sku = null) {
    const select = document.getElementById('pRowId');
    select.innerHTML = ROWS.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    
    if(sku) {
        const p = PRODUCTS.find(x => x.sku == sku);
        document.getElementById('pSku').value = p.sku;
        document.getElementById('pSku').disabled = true;
        document.getElementById('pName').value = p.name;
        document.getElementById('pWidth').value = p.widthM;
        document.getElementById('pRowId').value = p.rowId;
        document.getElementById('pCurrent').value = p.current;
        document.getElementById('pMin').value = p.min;
        document.getElementById('pMax').value = p.max;
    } else {
        document.getElementById('pSku').disabled = false;
        document.getElementById('productModal').querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('pWidth').value = 0.4;
    }
    document.getElementById('productModal').classList.add('open');
}

function saveProduct() {
    const sku = document.getElementById('pSku').value;
    const data = {
        sku: sku,
        name: document.getElementById('pName').value,
        widthM: parseFloat(document.getElementById('pWidth').value),
        rowId: document.getElementById('pRowId').value,
        current: parseInt(document.getElementById('pCurrent').value) || 0,
        min: parseInt(document.getElementById('pMin').value) || 0,
        max: parseInt(document.getElementById('pMax').value) || 0
    };

    const idx = PRODUCTS.findIndex(x => x.sku == sku);
    if(idx >= 0) PRODUCTS[idx] = data;
    else PRODUCTS.push(data);

    sync();
    closeModals();
}

// FILAS CRUD
function openRowModal(id = null) {
    if(id) {
        const r = ROWS.find(x => x.id === id);
        document.getElementById('editRowId').value = r.id;
        document.getElementById('rName').value = r.name;
        document.getElementById('rSize').value = r.sizeM;
        document.getElementById('btnDelRow').style.display = 'block';
    } else {
        document.getElementById('editRowId').value = '';
        document.getElementById('rName').value = '';
        document.getElementById('rSize').value = 10;
        document.getElementById('btnDelRow').style.display = 'none';
    }
    document.getElementById('rowModal').classList.add('open');
}

function saveRow() {
    const id = document.getElementById('editRowId').value || 'R' + Date.now();
    const data = {
        id: id,
        name: document.getElementById('rName').value,
        sizeM: parseFloat(document.getElementById('rSize').value)
    };

    const idx = ROWS.findIndex(x => x.id === id);
    if(idx >= 0) ROWS[idx] = data;
    else ROWS.push(data);

    sync();
    closeModals();
}

function deleteRow() {
    const id = document.getElementById('editRowId').value;
    if(confirm("¿Eliminar esta fila y dejar los productos sin asignar?")) {
        ROWS = ROWS.filter(x => x.id !== id);
        PRODUCTS.forEach(p => { if(p.rowId === id) p.rowId = ''; });
        sync();
        closeModals();
    }
}

// SAP Y BÚSQUEDA
function processSap() {
    const raw = document.getElementById('sapInput').value.trim();
    const lines = raw.split('\n');
    let count = 0;
    lines.forEach(line => {
        const part = line.split(/[\t\s]{2,}|\|/); // Detecta tab o múltiples espacios
        if(part.length >= 2) {
            const sku = part[0].trim();
            const stock = parseInt(part[part.length-1]) || 0;
            const p = PRODUCTS.find(x => x.sku == sku);
            if(p) { p.current = stock; count++; }
        }
    });
    sync();
    alert(`Se actualizaron ${count} productos desde SAP.`);
}

function openDB() {
    const tbody = document.getElementById('dbTableBody');
    tbody.innerHTML = PRODUCTS.map(p => `
        <tr>
            <td>${p.rowId}</td>
            <td><b>${p.sku}</b></td>
            <td>${p.name}</td>
            <td style="color:${p.current < p.min ? 'var(--danger)' : 'inherit'}">${p.current}</td>
            <td><button class="btn btn-secondary" onclick="closeModals(); openProductModal('${p.sku}')">Editar</button></td>
        </tr>
    `).join('');
    document.getElementById('dbModal').classList.add('open');
}

function handleGlobalSearch(v) {
    if(!v) { currentHighlight = null; render(); return; }
    const found = PRODUCTS.find(p => p.sku.includes(v) || p.name.toLowerCase().includes(v.toLowerCase()));
    if(found) {
        currentHighlight = found.sku;
        render();
        document.getElementById('whWrap').scrollIntoView({behavior:'smooth', block:'end'});
    }
}

function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
</script>
</body>
</html>
